name: Accuknox SAST

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  accuknox-cicd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: "Run Accuknox SAST: Opengrep"
        uses: accuknox/sast-scan-opengrep-action@latest
        with:
          accuknox_endpoint: "cspm.demo.accuknox.com"
          accuknox_token: ${{ secrets.ACCUKNOX_TOKEN }}
          accuknox_label: "zorisast"
          soft_fail: "true"
